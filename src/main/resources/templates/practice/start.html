<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Тренування')}"></head>

<body>
<div class="app-shell">

    <div th:replace="~{admin/fragments/layout :: sidebar('practice')}"></div>

    <main class="main">
        <div th:replace="~{admin/fragments/layout :: topbar('Тренування')}"></div>

        <section class="card">
            <div class="card-header">
                <h2 class="card-title">Почати тренування</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
                Error
            </div>

            <form class="form"
                  th:action="@{/practice/start}"
                  method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid form-grid-2">

                    <div class="form-group">
                        <label class="form-label" for="volumeId">Том</label>

                        <select class="form-control"
                                id="volumeId"
                                name="volumeId"
                                data-volume-select
                                data-placeholder="Почни вводити назву тому..."
                                required>
                            <option value=""></option>

                            <option th:each="volume : ${volumes}"
                                    th:value="${volume.id}"
                                    th:text="${volume.title}">
                                Java Core
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="sectionId">Розділ</label>

                        <select class="form-control"
                                id="sectionId"
                                name="sectionId"
                                data-section-select
                                data-placeholder="Почни вводити назву розділу..."
                                required>
                            <option value=""></option>

                            <option th:each="section : ${sections}"
                                    th:value="${section.id}"
                                    th:data-volume-id="${section.volume.id}"
                                    th:text="${section.title}">
                                JVM, Memory
                            </option>
                        </select>
                    </div>

                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">
                        Почати
                    </button>
                </div>
            </form>
        </section>
    </main>

</div>
</body>
</html>
