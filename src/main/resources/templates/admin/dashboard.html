<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Адмінка')}"></head>

<body>
<div class="app-shell">

    <div th:replace="~{admin/fragments/layout :: sidebar('dashboard')}"></div>

    <main class="main">
        <div th:replace="~{admin/fragments/layout :: topbar('Адмінка')}"></div>

        <div class="dashboard-grid">
            <a class="dashboard-card" th:href="@{/admin/volumes}">
                <div class="dashboard-card-title">Томи</div>
                <div class="dashboard-card-text">
                    Великі блоки навчання: Java Core, Spring, Hibernate, Algorithms.
                </div>
            </a>

            <a class="dashboard-card" th:href="@{/admin/sections}">
                <div class="dashboard-card-title">Розділи</div>
                <div class="dashboard-card-text">
                    Підрозділи всередині томів: JVM, OOP, Collections, Security.
                </div>
            </a>

            <a class="dashboard-card" th:href="@{/admin/questions}">
                <div class="dashboard-card-title">Питання</div>
                <div class="dashboard-card-text">
                    База питань, коротких відповідей, повних пояснень і підказок.
                </div>
            </a>
        </div>
    </main>

</div>
</body>
</html>
