<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head(${pageTitle})}"></head>

<body>
<div class="app-shell">

    <div th:replace="~{admin/fragments/layout :: sidebar('volumes')}"></div>

    <main class="main">
        <div th:replace="~{admin/fragments/layout :: topbar(${pageTitle})}"></div>

        <section class="card">
            <div class="card-header">
                <h2 class="card-title" th:text="${pageTitle}">Том</h2>
                <a class="btn" th:href="@{/admin/volumes}">← До списку</a>
            </div>

            <form class="form"
                  th:action="${volume.id == null} ? @{/admin/volumes} : @{/admin/volumes/{id}(id=${volume.id})}"
                  th:object="${volume}"
                  method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label" for="title">Назва</label>
                    <input class="form-control"
                           id="title"
                           type="text"
                           th:field="*{title}"
                           placeholder="Наприклад: Java Core"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="slug">Slug</label>
                    <input class="form-control"
                           id="slug"
                           type="text"
                           th:field="*{slug}"
                           placeholder="Наприклад: java-core">
                    <span class="form-help">
                        Можна залишити пустим — згенерується автоматично з назви.
                    </span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Опис</label>
                    <textarea class="form-control"
                              id="description"
                              th:field="*{description}"
                              rows="5"
                              placeholder="Короткий опис тому"></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" th:field="*{active}">
                        Активний
                    </label>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Зберегти</button>
                    <a class="btn" th:href="@{/admin/volumes}">Скасувати</a>
                </div>
            </form>
        </section>
    </main>

</div>
</body>
</html>
