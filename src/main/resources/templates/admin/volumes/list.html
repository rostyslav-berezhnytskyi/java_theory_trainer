<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head('Томи')}"></head>

<body>
<div class="app-shell">

    <div th:replace="~{admin/fragments/layout :: sidebar('volumes')}"></div>

    <main class="main">
        <div th:replace="~{admin/fragments/layout :: topbar('Томи')}"></div>

        <section class="card">
            <div class="card-header">
                <h2 class="card-title">Список томів</h2>

                <a class="btn btn-primary" th:href="@{/admin/volumes/new}">
                    + Додати том
                </a>
            </div>

            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Назва</th>
                    <th>Slug</th>
                    <th>Порядок</th>
                    <th>Статус</th>
                    <th>Дії</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="volume : ${volumes}">
                    <td th:text="${volume.id}">1</td>
                    <td th:text="${volume.title}">Java Core</td>
                    <td th:text="${volume.slug}">java-core</td>
                    <td th:text="${volume.sortOrder}">0</td>
                    <td>
                        <span th:if="${volume.active}" class="badge badge-green">Активний</span>
                        <span th:if="${!volume.active}" class="badge badge-gray">Архів</span>
                    </td>
                    <td>
                        <div class="actions">
                            <a class="btn btn-small"
                               th:href="@{/admin/volumes/{id}/edit(id=${volume.id})}">
                                Редагувати
                            </a>

                            <form th:if="${volume.active}"
                                  class="inline-form"
                                  th:action="@{/admin/volumes/{id}/archive(id=${volume.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-small btn-danger" type="submit">
                                    Архівувати
                                </button>
                            </form>

                            <form th:if="${!volume.active}"
                                  class="inline-form"
                                  th:action="@{/admin/volumes/{id}/activate(id=${volume.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-small btn-primary" type="submit">
                                    Активувати
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(volumes)}">
                    <td colspan="6">Поки немає жодного тому.</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>

</div>
</body>
</html>
