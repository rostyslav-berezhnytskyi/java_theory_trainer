<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Java Theory Trainer'">Java Theory Trainer</title>

    <!-- Tom Select -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.css">

    <!-- GLightbox for image preview -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js" defer></script>
    <script th:src="@{/js/admin.js}" defer></script>
</head>

<body>

<aside class="sidebar" th:fragment="sidebar(activePage)">
    <div class="sidebar-title">Java Theory Trainer</div>

    <nav class="sidebar-nav">
        <a th:href="@{/admin}"
           class="sidebar-link"
           th:classappend="${activePage == 'dashboard'} ? ' active'">
            Dashboard
        </a>

        <a th:href="@{/admin/volumes}"
           class="sidebar-link"
           th:classappend="${activePage == 'volumes'} ? ' active'">
            Томи
        </a>

        <a th:href="@{/admin/sections}"
           class="sidebar-link"
           th:classappend="${activePage == 'sections'} ? ' active'">
            Розділи
        </a>

        <a th:href="@{/admin/questions}"
           class="sidebar-link"
           th:classappend="${activePage == 'questions'} ? ' active'">
            Питання
        </a>
    </nav>
</aside>

<header class="topbar" th:fragment="topbar(pageTitle)">
    <h1 class="page-title" th:text="${pageTitle}">Page title</h1>

    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn btn-secondary" type="submit">Logout</button>
    </form>
</header>

</body>
</html>
