<!DOCTYPE html>
<html lang="uk"
      xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Java Theory Trainer'">Java Theory Trainer</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<aside class="sidebar" th:fragment="sidebar(activePage)">
    <div class="sidebar-title">Java Theory Trainer</div>

    <nav class="sidebar-nav">
        <a th:href="@{/admin}"
           class="sidebar-link"
           th:classappend="${activePage == 'dashboard'} ? ' active'">
            Dashboard
        </a>

        <a th:href="@{/admin/volumes}"
           class="sidebar-link"
           th:classappend="${activePage == 'volumes'} ? ' active'">
            Томи
        </a>

        <a th:href="@{/admin/sections}"
           class="sidebar-link"
           th:classappend="${activePage == 'sections'} ? ' active'">
            Розділи
        </a>

        <a th:href="@{/admin/questions}"
           class="sidebar-link"
           th:classappend="${activePage == 'questions'} ? ' active'">
            Питання
        </a>
    </nav>
</aside>

<header class="topbar" th:fragment="topbar(pageTitle)">
    <h1 class="page-title" th:text="${pageTitle}">Page title</h1>

    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn btn-secondary" type="submit">Logout</button>
    </form>
</header>

</body>
</html>
