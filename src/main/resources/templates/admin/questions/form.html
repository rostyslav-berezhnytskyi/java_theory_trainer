<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments/layout :: head(${pageTitle})}"></head>

<body>
<div class="app-shell">

    <div th:replace="~{admin/fragments/layout :: sidebar('questions')}"></div>

    <main class="main">
        <div th:replace="~{admin/fragments/layout :: topbar(${pageTitle})}"></div>

        <section class="card">
            <div class="card-header">
                <h2 class="card-title" th:text="${pageTitle}">Питання</h2>
                <a class="btn" th:href="@{/admin/questions}">← До списку</a>
            </div>

            <form class="form form-wide"
                  th:action="${questionForm.id == null} ? @{/admin/questions} : @{/admin/questions/{id}(id=${questionForm.id})}"
                  th:object="${questionForm}"
                  method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label" for="sectionId">Розділ</label>

                    <select class="form-control" id="sectionId" th:field="*{sectionId}" required>
                        <option value="">-- Обери розділ --</option>

                        <option th:each="section : ${sections}"
                                th:value="${section.id}"
                                th:text="${section.volume.title + ' / ' + section.title}">
                            Java Core / JVM, Memory
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="questionText">Питання</label>
                    <textarea class="form-control"
                              id="questionText"
                              th:field="*{questionText}"
                              rows="4"
                              placeholder="Наприклад: Що таке JVM, JRE і JDK?"
                              required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shortAnswer">Коротка відповідь</label>
                    <textarea class="form-control"
                              id="shortAnswer"
                              th:field="*{shortAnswer}"
                              rows="5"
                              placeholder="Коротка відповідь, яку можна сказати на співбесіді за 20-40 секунд"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="fullAnswer">Повна відповідь</label>
                    <textarea class="form-control"
                              id="fullAnswer"
                              th:field="*{fullAnswer}"
                              rows="10"
                              placeholder="Повне пояснення теми"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="hint">Підказка</label>
                    <textarea class="form-control"
                              id="hint"
                              th:field="*{hint}"
                              rows="3"
                              placeholder="Підказка, якщо не можеш згадати відповідь"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="mustHavePointsText">Must-have points</label>
                    <textarea class="form-control"
                              id="mustHavePointsText"
                              th:field="*{mustHavePointsText}"
                              rows="6"
                              placeholder="Кожен обов'язковий пункт з нового рядка"></textarea>
                    <span class="form-help">
                        AI буде використовувати ці пункти як чекліст правильної відповіді.
                    </span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="commonMistakesText">Common mistakes</label>
                    <textarea class="form-control"
                              id="commonMistakesText"
                              th:field="*{commonMistakesText}"
                              rows="5"
                              placeholder="Кожна типова помилка з нового рядка"></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="difficulty">Складність</label>
                        <select class="form-control" id="difficulty" th:field="*{difficulty}">
                            <option th:each="difficulty : ${difficulties}"
                                    th:value="${difficulty}"
                                    th:text="${difficulty}">
                                MEDIUM
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="status">Статус</label>
                        <select class="form-control" id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                                DRAFT
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="sortOrder">Порядок</label>
                        <input class="form-control"
                               id="sortOrder"
                               type="number"
                               th:field="*{sortOrder}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tags">Теги</label>
                    <input class="form-control"
                           id="tags"
                           type="text"
                           th:field="*{tags}"
                           placeholder="jvm,memory,interview-basic">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sourceReference">Джерело</label>
                    <input class="form-control"
                           id="sourceReference"
                           type="text"
                           th:field="*{sourceReference}"
                           placeholder="Java Core.docx, JVM Memory, page 5">
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Зберегти</button>
                    <a class="btn" th:href="@{/admin/questions}">Скасувати</a>
                </div>
            </form>
        </section>
    </main>

</div>
</body>
</html>
